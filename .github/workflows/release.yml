name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  read-msrv:
    uses: actions-rust-lang/msrv/.github/workflows/msrv.yml@b95a3a81b0efee6438b858b41a84aff627e01351 # v0.1.1

  release:
    needs: read-msrv
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
      attestations: write
      artifact-metadata: write
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - name: Generate APP_TOKEN
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_PRIVATE_KEY }}
          repositories: homebrew-tap
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4 # zizmor: ignore[cache-poisoning]
        with:
          toolchain: ${{ needs.read-msrv.outputs.msrv }}
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1 # zizmor: ignore[cache-poisoning]
        with:
          # Pin Zig: 0.16.0 broke aarch64-pc-windows-gnullvm compiler-rt
          # (undefined __chkstk / __udivti3 / __floatuntidf). 0.15.2 is the
          # last version that produced a green release (tag 0.1.21).
          version: 0.15.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          go-version: stable

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Download macOS SDK
        run: |
          curl -sL https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz -o sdk.tar.xz
          echo "beee7212d265a6d2867d0236cc069314b38d5fb3486a6515734e76fa210c784c sdk.tar.xz" | sha256sum -c -
          tar xf sdk.tar.xz
          echo "SDKROOT=$(pwd)/MacOSX26.1.sdk" >> $GITHUB_ENV

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v.0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_APP_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Attest release artifacts
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.spdx.json

      - name: Upload attestation bundles to release
        run: gh release upload "${TAG_NAME}" "${BUNDLE_PATH}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}

      - name: Generate subject hashes for SLSA provenance
        id: hash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip *.spdx.json > checksums.txt
          echo "hashes=$(base64 -w0 checksums.txt)" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker build context
        run: |
          cp dist/idt_x86_64-unknown-linux-musl/idt idt-amd64
          cp dist/idt_aarch64-unknown-linux-musl/idt idt-arm64
      - name: Build and push Docker images
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          sbom: true
          push: true
          tags: |
            docker.io/seonghyeon/idt:${{ github.ref_name }}
            docker.io/seonghyeon/idt:latest
            ghcr.io/sh-cho/idt:${{ github.ref_name }}
            ghcr.io/sh-cho/idt:latest

      - name: Scan container image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/sh-cho/idt:${{ github.ref_name }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Sign container images
        env:
          TAGS: |
            docker.io/seonghyeon/idt:${{ github.ref_name }}
            docker.io/seonghyeon/idt:latest
            ghcr.io/sh-cho/idt:${{ github.ref_name }}
            ghcr.io/sh-cho/idt:latest
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  provenance:
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    #  SLSA generator requires tag ref (https://github.com/slsa-framework/slsa-github-generator/issues/722)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
      draft-release: true

  publish:
    needs: [release, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - name: Publish release
        run: gh release edit "${TAG_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}

  publish-crate:
    needs: read-msrv
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4 # zizmor: ignore[cache-poisoning]
        with:
          toolchain: ${{ needs.read-msrv.outputs.msrv }}
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
